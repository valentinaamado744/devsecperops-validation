sonar.projectKey=devsecperops-validation
sonar.projectName=DevSecPerOps Validation
sonar.projectVersion=1.0

sonar.sources=app
sonar.tests=tests
sonar.language=py
sonar.python.version=3.11

# Cobertura (generada por pytest-cov en formato Cobertura XML)
sonar.python.coverage.reportPaths=coverage.xml

# Exclusiones
sonar.exclusions=**/__init__.py,tests/**

# Codificación
sonar.sourceEncoding=UTF-8
