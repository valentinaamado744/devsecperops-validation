name: DevSecPerOps Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-test-quality:
    name: CI - Test, Cobertura y SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar pruebas con cobertura
        run: |
          pytest --cov=app --cov-report=xml --cov-report=term

      - name: Subir cobertura como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate
        continue-on-error: true
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  security:
    name: Seguridad - Dependencias y DAST
    runs-on: ubuntu-latest
    needs: build-test-quality
    steps:
      - uses: actions/checkout@v4

      - name: OWASP Dependency-Check
        continue-on-error: true
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'devsecperops-validation'
          path: '.'
          format: 'JSON'
          out: 'reports'
          args: >-
            --enableExperimental

      - name: Subir reporte de dependencias
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check
          path: reports/dependency-check-report.json

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar y arrancar la API
        run: |
          pip install -r requirements.txt
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 8
          curl -s http://localhost:8000/health || true
          curl -s http://localhost:8000/openapi.json -o /dev/null -w "openapi.json: %{http_code}\n"

      - name: OWASP ZAP Active Scan (API)
        # Sustituye al análisis baseline (pasivo). zap-api-scan.py usa la
        # especificación OpenAPI de la propia API (expuesta por FastAPI en
        # /openapi.json) para conocer endpoints y parámetros, y lanza contra
        # ellos un análisis ACTIVO (envío real de payloads: SQLi, XSS, etc.),
        # no solo observación pasiva del tráfico. La API corre de forma
        # efímera y aislada en este runner de CI (SQLite en memoria, sin
        # datos reales), por lo que el ataque activo no supone riesgo alguno.
        continue-on-error: true
        timeout-minutes: 20
        run: |
          mkdir -p zap-out && chmod 777 zap-out
          docker run --rm --network host -v "$(pwd)/zap-out:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable zap-api-scan.py \
            -t http://localhost:8000/openapi.json -f openapi \
            -J zap-report.json -I || true
          cp zap-out/zap-report.json zap-report.json 2>/dev/null || echo '{}' > zap-report.json
          echo "--- Resumen ZAP (active scan) ---"; ls -la zap-out

      - name: Subir reporte ZAP
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap-report.json

  performance:
    name: Rendimiento - Pruebas de carga k6
    runs-on: ubuntu-latest
    needs: build-test-quality
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar y arrancar la API
        run: |
          pip install -r requirements.txt
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 8
          curl -s http://localhost:8000/health || true

      - name: Instalar k6
        run: |
          curl -fsSL https://github.com/grafana/k6/releases/download/v0.50.0/k6-v0.50.0-linux-amd64.tar.gz -o k6.tar.gz
          tar -xzf k6.tar.gz
          sudo mv k6-v0.50.0-linux-amd64/k6 /usr/local/bin/k6
          k6 version

      - name: Ejecutar prueba de carga k6
        continue-on-error: true
        run: k6 run k6/load-test.js
        env:
          BASE_URL: http://localhost:8000

      - name: Subir resumen k6
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-summary
          path: k6-summary.json

  quality-gates:
    name: Gobernanza - Evaluacion de Quality Gates
    runs-on: ubuntu-latest
    needs: [security, performance]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Evaluar Quality Gates del modelo
        run: |
          python scripts/check_gates.py \
            --coverage artifacts/coverage/coverage.xml \
            --dependency artifacts/dependency-check/dependency-check-report.json \
            --zap artifacts/zap-report/zap-report.json \
            --k6 artifacts/k6-summary/k6-summary.json

      - name: Subir resumen de gobernanza
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gates-summary
          path: gates-summary.json

  deploy:
    name: Despliegue continuo (Kubernetes)
    runs-on: ubuntu-latest
    needs: quality-gates
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Desplegar en Kubernetes
        run: |
          echo "Todos los quality gates superados."
          echo "kubectl apply -f k8s/  (requiere KUBECONFIG configurado)"
